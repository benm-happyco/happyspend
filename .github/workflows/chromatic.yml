name: Chromatic

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  chromatic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build icon packages
        run: |
          npm --prefix vendor/core-stroke-rounded install
          npm --prefix vendor/core-stroke-rounded run build
          npm --prefix vendor/hugeicons-react install
          npm --prefix vendor/hugeicons-react run build:bundles

      - name: Publish to Chromatic
        run: npx chromatic --project-token=${{ secrets.CHROMATIC_PROJECT_TOKEN }}
